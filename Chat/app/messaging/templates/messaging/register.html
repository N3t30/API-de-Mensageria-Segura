<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mensageria Premium</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'messaging/css/auth.css' %}?v=3">
</head>
<body>

<div class="auth-container">
    <h1>Criar conta</h1>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" id="registerForm">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Escolha um usuário" required autocomplete="off">
        <input type="password" name="password" placeholder="Crie uma senha forte" required autocomplete="new-password">
        <button type="submit" id="submitbtn">Registrar</button>
    </form>

    <div class="link">
        Já tem uma conta?
        <a href="{% url 'login-page' %}">Faça login</a>
    </div>

</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function() {
        const btn = document.getElementById('submitbtn');
        btn.disabled = true;
        btn.innerHTML = 'Criando...';
    });
</script>

</body>
</html>
